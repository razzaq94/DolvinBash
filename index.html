<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Dolwin &amp; Bash</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;600;800&family=Luckiest+Guy&family=Bubblegum+Sans&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/ui.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        body {
            touch-action: none;
        }

        #game-root {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <div id="game-root"></div>
    <div id="ui-root"></div>
    <div id="orientation-lock" aria-hidden="true">
        <div class="orientation-card">
            <div class="orientation-title">Rotate your device</div>
            <div class="orientation-subtitle">This game is portrait only.</div>
        </div>
    </div>

    <script>
        (function detectFileProtocol() {
            if (window.location.protocol !== "file:") return;

            const root = document.getElementById("game-root");
            if (!root) return;

            root.innerHTML = [
                '<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:24px;color:#e2e8f0;font-family:Inter,Arial,sans-serif;text-align:center;">',
                '<div style="max-width:520px;">',
                '<h1 style="font-size:28px;margin-bottom:12px;color:#fff;">Server required</h1>',
                '<p style="line-height:1.6;margin-bottom:16px;">This game cannot run from a double-clicked HTML file. Browsers block game modules and assets on <code style="color:#93c5fd;">file://</code>.</p>',
                '<p style="line-height:1.6;margin-bottom:16px;"><strong>Easy fix:</strong> double-click <code style="color:#93c5fd;">start.bat</code> in this folder.</p>',
                '<p style="line-height:1.6;color:#94a3b8;">Or run: <code style="color:#93c5fd;">python -m http.server 8765</code> then open <code style="color:#93c5fd;">http://localhost:8765</code></p>',
                '</div></div>'
            ].join("");
        })();

        (function uiScaleBootstrap() {
            const DESIGN_W = 1920;
            const DESIGN_H = 1080;

            function getViewport() {
                const vv = window.visualViewport;
                const vw = Math.max(1, Math.round(vv?.width ?? window.innerWidth));
                const vh = Math.max(1, Math.round(vv?.height ?? window.innerHeight));
                return { vw, vh };
            }

            function updateUiScale() {
                const { vw, vh } = getViewport();
                const isPortrait = vh >= vw;
                const isSmallScreen = Math.min(vw, vh) <= 900;

                // Desktop/large: upscale UI with viewport (4K etc).
                // Mobile portrait: keep tuned mobile CSS sizes (scale = 1).
                let scale = 1;
                if (!isSmallScreen && !isPortrait) {
                    scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
                    scale = Math.max(1, Math.min(scale, 1.85));
                }

                document.documentElement.style.setProperty("--ui-scale", String(scale));
            }

            updateUiScale();
            window.addEventListener("resize", updateUiScale, { passive: true });
            window.visualViewport?.addEventListener("resize", updateUiScale, { passive: true });
        })();

        (function bootGame() {
            const phaserSources = [
                "https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js",
                "https://unpkg.com/phaser@3.80.1/dist/phaser.min.js",
                "https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"
            ];

            function loadScript(src, type = "text/javascript") {
                return new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    script.src = src;
                    script.type = type;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            async function start() {
                let loaded = false;

                for (let i = 0; i < phaserSources.length; i++) {
                    try {
                        await loadScript(phaserSources[i]);
                        loaded = true;
                        break;
                    } catch (error) {
                        console.warn("[Dolwin & Bash] Phaser source failed:", phaserSources[i], error);
                    }
                }

                if (!loaded || typeof window.Phaser === "undefined") {
                    console.error("[Dolwin & Bash] Unable to load Phaser from all configured sources.");
                    return;
                }

                await loadScript("./src/main.js", "module");
            }

            start();
        })();
    </script>
</body>

</html>
