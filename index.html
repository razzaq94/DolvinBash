<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dolvin Bash</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;600;800&family=Luckiest+Guy&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/ui.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        body {
            touch-action: none;
        }

        #game-root {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head><body>
    <div id="game-root"></div>
    <div id="ui-root"></div>

    <script>
        (function bootGame() {
            const phaserSources = [
                "https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js",
                "https://unpkg.com/phaser@3.80.1/dist/phaser.min.js",
                "https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"
            ];

            function loadScript(src, type = "text/javascript") {
                return new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    script.src = src;
                    script.type = type;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            async function start() {
                let loaded = false;

                for (let i = 0; i < phaserSources.length; i++) {
                    try {
                        await loadScript(phaserSources[i]);
                        loaded = true;
                        break;
                    } catch (error) {
                        console.warn("[Dolvin Bash] Phaser source failed:", phaserSources[i], error);
                    }
                }

                if (!loaded || typeof window.Phaser === "undefined") {
                    console.error("[Dolvin Bash] Unable to load Phaser from all configured sources.");
                    return;
                }

                await loadScript("./src/main.js", "module");
            }

            start();
        })();
    </script>
</body>
</html>
